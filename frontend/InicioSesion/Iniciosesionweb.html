<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="diseñowebsesion.css">
</head>

<body>
    
    <div class="contenedor-login">

        <div class="lado-imagen">

            <video autoplay muted loop class="video-fondo">
                <source src="camionesweb.mp4" type="video/mp4">
            </video>

            <div class="overlay">
                <h1>Sistema RegiX</h1>
                <p>
                    Plataforma diseñada para gestión y control de transporte, diseñado para optimizar <br> la entrada y salida de 
                    camiones, mejorar la eficiencia operativa y garantizar un seguimiento seguro en tiempo real.
                </p>
            </div>

        </div>
    
        <div class="lado-formulario">

            <div class="Panelsito">

                <img src="logo.png" alt="logo" class="logo">

                <h1>Inicie Sesión</h1>

                <div class="input-group">
                    <img src="https://cdn-icons-png.freepik.com/512/11804/11804827.png" class="icono">
                    <input type="text" placeholder="Usuario">
                </div>

                <div class="input-group">
                    <img src="https://cdn-icons-png.flaticon.com/512/8860/8860050.png" class="icono">
                    <input type="password" placeholder="Clave">
                </div>

                <button>Ingresar</button>

                <p>Si ha olvidado su cuenta, póngase en contacto con el administrador.</p>

            </div>

        </div>

    </div>
    
</body>

</html>
